name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: make install

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd web && pnpm exec playwright install --with-deps

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd web && pnpm exec playwright install-deps

      - name: Check Formatting
        run: make format-check

      - name: Lint Code
        run: make lint

      - name: Type Check
        run: make typecheck

      - name: Run Unit Tests
        run: make test

      - name: Normalize Python coverage paths
        # pytest-cov runs from api/ so SF: paths are relative to api/.
        # SonarCloud indexes sources relative to repo root, so prefix api/.
        run: |
          if [[ -f api/coverage.lcov ]]; then
            sed -i 's|^SF:house_of_accusations/|SF:api/house_of_accusations/|g' api/coverage.lcov
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Store Web Coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 30

      - name: Store API Coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: api-coverage
          path: api/htmlcov/
          retention-days: 30

      - name: Build Web
        id: build-web
        run: make build-web
        continue-on-error: true

      - name: Run E2E Tests
        if: steps.build-web.outcome == 'success'
        run: make e2e

      - name: Run Performance / Lighthouse Tests
        if: steps.build-web.outcome == 'success'
        run: make perf

      - name: Secret Scan
        run: make secret-scan

      - name: Store Playwright Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Store Lighthouse Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-report
          path: web/.lighthouseci/
          retention-days: 30
