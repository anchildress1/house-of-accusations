  **/coverage/**,**/__pycache__/**,**/htmlcov/**,**/.venv/**,\
  **/.pytest_cache/**,**/.ruff_cache/**,**/.mypy_cache/**
sonar.coverage.exclusions=**/__init__.py,**/setupTests.ts
