target-version = "py313"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "ANN",  # flake8-annotations
    "RUF",  # ruff-specific
]
ignore = [
    "S101",    # use of assert (OK in tests)
]

[lint.per-file-ignores]
"*/tests/*" = ["S", "ANN"]

[format]
quote-style = "double"
indent-style = "space"
